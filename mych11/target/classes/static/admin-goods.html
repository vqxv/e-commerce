<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-admin { background: linear-gradient(135deg, #667eea, #764ba2); }
        .navbar-admin .nav-link, .navbar-admin .navbar-brand { color: white !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-admin">
    <div class="container">
        <a class="navbar-brand" href="#">管理后台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="admin.html">仪表盘</a></li>
                <li class="nav-item"><a class="nav-link active" href="admin-goods.html">商品管理</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-orders.html">订单管理</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-users.html">用户管理</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>商品列表</h2>
        <button class="btn btn-primary" onclick="openAddModal()">添加商品</button>
    </div>
    <table class="table table-hover">
        <thead><tr><th>ID</th><th>图片</th><th>名称</th><th>原价</th><th>现价</th><th>库存</th><th>推荐</th><th>操作</th></tr></thead>
        <tbody id="goodsBody"></tbody>
    </table>
</div>

<div class="modal fade" id="goodsModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加商品</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="goodsForm" enctype="multipart/form-data">
                    <input type="hidden" id="goodsId">
                    <div class="mb-3"><input class="form-control" id="gname" placeholder="名称" required></div>
                    <div class="row mb-3">
                        <div class="col"><input type="number" step="0.01" class="form-control" id="goprice" placeholder="原价" required></div>
                        <div class="col"><input type="number" step="0.01" class="form-control" id="grprice" placeholder="现价" required></div>
                    </div>
                    <div class="mb-3"><input type="number" class="form-control" id="gstore" placeholder="库存" required></div>
                    <div class="mb-3">
                        <select class="form-select" id="gtype"></select>
                    </div>
                    <div class="form-check"><input type="checkbox" class="form-check-input" id="isRecommend"> 推荐</div>
                    <div class="form-check"><input type="checkbox" class="form-check-input" id="isAd"> 广告</div>
                    <div class="mb-3"><input type="file" class="form-control" id="gfile"></div>
                    <button type="submit" class="btn btn-primary w-100">保存</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = new bootstrap.Modal('#goodsModal');
    async function loadGoods() {
        const res = await fetch('/api/admin/goods');
        const goods = await res.json();
        const tbody = document.getElementById('goodsBody');
        tbody.innerHTML = goods.map(g => `<tr>
            <td>${g.id}</td>
            <td><img src="/images/${g.picture || 'default.jpg'}" width="50"></td>
            <td>${g.name}</td>
            <td>¥${g.originalPrice}</td>
            <td>¥${g.currentPrice}</td>
            <td>${g.stock}</td>
            <td>${g.isRecommend ? '是' : '否'}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary" onclick='editGoods(${JSON.stringify(g)})'>编辑</button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteGoods(${g.id})">删除</button>
            </td>
        </tr>`).join('');
    }

    async function loadTypes() {
        const res = await fetch('/api/goodstypes');
        const types = await res.json();
        const sel = document.getElementById('gtype');
        sel.innerHTML = types.map(t => `<option value="${t.id}">${t.typename}</option>`).join('');
    }

    function openAddModal() {
        document.getElementById('goodsForm').reset();
        document.getElementById('goodsId').value = '';
        document.getElementById('modalTitle').textContent = '添加商品';
        modal.show();
    }

    function editGoods(g) {
        document.getElementById('goodsId').value = g.id;
        document.getElementById('gname').value = g.name;
        document.getElementById('goprice').value = g.originalPrice;
        document.getElementById('grprice').value = g.currentPrice;
        document.getElementById('gstore').value = g.stock;
        document.getElementById('isRecommend').checked = g.isRecommend == 1;
        document.getElementById('isAd').checked = g.isAdvertisement == 1;
        if (g.goodsType) document.getElementById('gtype').value = g.goodsType.id;
        document.getElementById('modalTitle').textContent = '编辑商品';
        modal.show();
    }

    document.getElementById('goodsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('goodsId').value;
        const form = new FormData();
        form.append('name', document.getElementById('gname').value);
        form.append('originalPrice', document.getElementById('goprice').value);
        form.append('currentPrice', document.getElementById('grprice').value);
        form.append('stock', document.getElementById('gstore').value);
        form.append('isRecommend', document.getElementById('isRecommend').checked ? 1 : 0);
        form.append('isAdvertisement', document.getElementById('isAd').checked ? 1 : 0);
        form.append('goodsType.id', document.getElementById('gtype').value);
        const fileInput = document.getElementById('gfile');
        if (fileInput.files.length > 0) form.append('file', fileInput.files[0]);

        const url = id ? `/api/admin/goods/${id}` : '/api/admin/goods';
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, { method, body: form });
        if (res.ok) {
            modal.hide();
            loadGoods();
        } else {
            alert('操作失败');
        }
    });

    async function deleteGoods(id) {
        if (!confirm('确定删除？')) return;
        const res = await fetch(`/api/admin/goods/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.result === 'ok') loadGoods();
        else alert('删除失败，可能有关联数据');
    }

    loadTypes();
    loadGoods();
</script>
</body>
</html>
