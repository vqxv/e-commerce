<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/index.html">E-Shop</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/index.html">首页</a>
                <a class="nav-link" href="/cart.html">购物车</a>
                <a class="nav-link" href="/my-focus.html">收藏</a>
                <a class="nav-link active" href="/my-orders.html">订单</a>
                <a class="nav-link" href="/user-info.html">个人</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 pt-4">
        <h2 class="mb-4">我的订单</h2>
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-box-seam" style="font-size:3rem;color:#ccc;"></i>
            <h4 class="mt-3">你还没有任何订单</h4>
            <p>去 <a href="/index.html" class="btn btn-primary btn-sm">首页</a> 下单吧！</p>
        </div>
        <!-- 订单表格 -->
        <div id="orderTable" class="table-responsive d-none">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>订单编号</th>
                        <th>总金额</th>
                        <th>状态</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="orderBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadOrders() {
            try {
                const resp = await fetch('/api/orders');
                if (!resp.ok) { window.location.href='/login.html'; return; }
                const data = await resp.json();
                const empty = document.getElementById('emptyState');
                const table = document.getElementById('orderTable');
                const tbody = document.getElementById('orderBody');
                if (!data || data.length === 0) {
                    empty.classList.remove('d-none');
                    table.classList.add('d-none');
                    return;
                }
                empty.classList.add('d-none');
                table.classList.remove('d-none');
                tbody.innerHTML = data.map(o => `
                    <tr>
                        <td>${o.orderId}</td>
                        <td class="text-danger fw-bold">¥${o.totalAmount}</td>
                        <td>
                            <span class="badge ${o.status === 0 ? 'bg-warning text-dark' : 'bg-success'}">
                                ${o.status === 0 ? '待支付' : '已支付'}
                            </span>
                        </td>
                        <td>${o.createTime.replace('T',' ')}</td>
                        <td>
                            <button class="btn btn-outline-secondary btn-sm" onclick="viewDetail(${o.orderId})">详情</button>
                            ${o.status === 0 ? `<button class="btn btn-outline-success btn-sm ms-1" onclick="payOrder(${o.orderId})">支付</button>` : ''}
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function payOrder(orderId) {
            const resp = await fetch('/api/orders/' + orderId + '/pay', { method: 'PUT' });
            const data = await resp.json();
            if (data.success) loadOrders();
            else alert('支付失败');
        }

        function viewDetail(orderId) {
            fetch('/api/orders/' + orderId + '/items')
                .then(r => r.json())
                .then(items => {
                    if (!items || items.length === 0) {
                        alert('无商品明细');
                        return;
                    }
                    let detail = items.map(i => `${i.name} x${i.quantity} = ¥${i.subtotal}`).join('\n');
                    alert('订单详情：\n' + detail);
                });
        }

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>
</html>
