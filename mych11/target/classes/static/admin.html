<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理仪表盘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .navbar-admin { background: linear-gradient(135deg, #667eea, #764ba2); }
        .navbar-admin .nav-link, .navbar-admin .navbar-brand { color: white !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-admin">
    <div class="container">
        <a class="navbar-brand" href="#">管理后台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="admin.html">仪表盘</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-goods.html">商品管理</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-orders.html">订单管理</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-users.html">用户管理</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>销售统计</h2>
    <div id="mainChart" style="width:100%;height:400px;"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    fetch('/api/admin/salesData')
        .then(r => r.json())
        .then(data => {
            const chart = echarts.init(document.getElementById('mainChart'));
            chart.setOption({
                title: { text: '月销售额' },
                xAxis: { data: data.months },
                yAxis: {},
                series: [{ name: '销售额', type: 'bar', data: data.values }]
            });
        });
</script>
</body>
</html>
