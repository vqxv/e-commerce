<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-admin { background: linear-gradient(135deg, #667eea, #764ba2); }
        .navbar-admin .nav-link, .navbar-admin .navbar-brand { color: white !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-admin">
    <div class="container">
        <a class="navbar-brand" href="#">管理后台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="admin.html">仪表盘</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-goods.html">商品管理</a></li>
                <li class="nav-item"><a class="nav-link active" href="admin-orders.html">订单管理</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-users.html">用户管理</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>订单列表</h2>
    <table class="table table-hover">
        <thead><tr><th>订单号</th><th>用户</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
        <tbody id="ordersBody"></tbody>
    </table>
</div>
<script>
    async function loadOrders() {
        const res = await fetch('/api/admin/orders');
        const orders = await res.json();
        const status = {0:'待支付',1:'已支付',2:'已取消'};
        document.getElementById('ordersBody').innerHTML = orders.map(o => `<tr>
            <td>${o.id}</td>
            <td>${o.user?.email || ''}</td>
            <td>¥${o.totalAmount}</td>
            <td>${status[o.status] || o.status}</td>
            <td>${new Date(o.createTime).toLocaleString()}</td>
        </tr>`).join('');
    }
    loadOrders();
</script>
</body>
</html>
