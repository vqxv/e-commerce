<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单详情 - E-Shop</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <script th:src="@{/js/common.js}"></script>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container mt-5 pt-4">
        <h2 class="mb-3">订单详情</h2>
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5>订单编号：<span class="text-primary" th:text="${order.id}"></span></h5>
                <p class="mb-1">下单时间：<span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
                <p class="mb-1">状态：
                    <span th:if="${order.status == 0}" class="badge bg-warning text-dark">待支付</span>
                    <span th:if="${order.status == 1}" class="badge bg-success">已支付</span>
                </p>
                <p>总金额：<span class="text-danger fw-bold fs-4">¥<span th:text="${order.totalAmount}"></span></span></p>
            </div>
        </div>
        <h4>商品清单</h4>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>商品图片</th>
                        <th>名称</th>
                        <th>单价</th>
                        <th>数量</th>
                        <th>小计</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.orderItems}">
                        <td>
                            <img th:src="@{/images/{img}(img=${item.goods.picture})}" class="rounded" style="width: 60px; height: 60px; object-fit: cover;">
                        </td>
                        <td th:text="${item.goods.name}"></td>
                        <td class="text-danger">¥<span th:text="${item.price}"></span></td>
                        <td th:text="${item.quantity}"></td>
                        <td class="text-danger fw-bold">¥<span th:text="${item.price * item.quantity}"></span></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4">
            <a th:href="@{/cart/myOrders}" class="btn btn-secondary">返回订单列表</a>
            <button th:if="${order.status == 0}" class="btn btn-success ms-2" th:onclick="'payOrder('+${order.id}+')'">立即支付</button>
        </div>
    </div>
</body>
</html>
