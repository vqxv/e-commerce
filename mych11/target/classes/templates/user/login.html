<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5 pt-4" style="max-width: 450px;">
        <div class="card shadow">
            <div class="card-header text-white text-center" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                <h4 class="mb-0">用户登录</h4>
            </div>
            <div class="card-body">
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <div th:if="${param.error}" class="alert alert-danger">邮箱或密码错误</div>
                <div th:if="${param.logout}" class="alert alert-info">您已退出登录</div>

                <form th:action="@{/user/login}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="请输入邮箱">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
                    </div>
                    <div class="mb-3 row">
                        <div class="col-7">
                            <label for="validateCode" class="form-label">验证码</label>
                            <input type="text" class="form-control" id="validateCode" name="code" required maxlength="4" placeholder="验证码">
                        </div>
                        <div class="col-5 d-flex align-items-end">
                            <img th:src="@{/validateCode}" id="codeImg" alt="验证码" style="height:38px; cursor:pointer; border:1px solid #ddd;" onclick="this.src='/validateCode?'+Math.random()">
                            <small class="ms-1" style="cursor:pointer;" onclick="document.getElementById('codeImg').click()">看不清</small>
                        </div>
                    </div>
                    <button type="submit" class="btn w-100 text-white" style="background: linear-gradient(135deg, #667eea, #764ba2);">登 录</button>
                </form>
                <div class="mt-3 text-center">
                    还没有账号？<a th:href="@{/user/toRegister}">立即注册</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
</body>
</html>
