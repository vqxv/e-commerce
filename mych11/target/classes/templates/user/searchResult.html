<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${keyword != null}" th:text="'搜索“' + ${keyword} + '”的结果'">搜索结果</title>
    <title th:if="${currentType != null}" th:text="${currentType.typename} + ' - 分类商品'">分类商品</title>
    <title th:if="${keyword == null and currentType == null}">商品列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 公共头部 -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5 pt-4">

    <!-- 页面标题 -->
    <h3 th:if="${keyword != null}" class="mb-4">
        搜索结果：<span class="text-primary" th:text="${keyword}"></span>
    </h3>
    <h3 th:if="${currentType != null}" class="mb-4" th:text="${currentType.typename}"></h3>

    <!-- 商品列表展示（使用与首页相同的卡片布局） -->
    <div th:if="${not #lists.isEmpty(goodsList)}" class="row row-cols-2 row-cols-md-4 g-3">
        <div class="col" th:each="goods : ${goodsList}">
            <div class="card h-100 shadow-sm">
                <a th:href="@{/goodsDetail(id=${goods.id})}">
                    <img th:src="@{/images/{img}(img=${goods.picture})}"
                         class="card-img-top" style="height:200px; object-fit:cover;"
                         alt="商品图片">
                </a>
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title" th:text="${goods.name}"></h6>
                    <p class="card-text">
                        <span class="text-danger fw-bold">
                            ¥<span th:text="${#numbers.formatDecimal(goods.currentPrice, 0, 2)}"></span>
                        </span>
                        <small class="text-muted text-decoration-line-through ms-2">
                            ¥<span th:text="${#numbers.formatDecimal(goods.originalPrice, 0, 2)}"></span>
                        </small>
                    </p>
                    <div class="mt-auto d-flex gap-2">
                        <button class="btn btn-sm btn-primary"
                                th:onclick="'addToCart('+${goods.id}+',1,this)'">
                            🛒 购物车
                        </button>
                        <button class="btn btn-sm btn-outline-danger"
                                th:onclick="'focusGoods('+${goods.id}+',this)'">
                            ❤️ 收藏
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 无结果提示 -->
    <div th:if="${#lists.isEmpty(goodsList)}" class="alert alert-warning mt-4">
        <span th:if="${keyword != null}">
            很抱歉，未找到包含 “<strong th:text="${keyword}"></strong>” 的商品。
        </span>
        <span th:if="${currentType != null}">
            该分类下暂无商品，请浏览其他分类。
        </span>
        <span th:if="${keyword == null and currentType == null}">
            暂无商品数据。
        </span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
