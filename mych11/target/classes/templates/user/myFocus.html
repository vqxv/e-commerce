<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的收藏 - E-Shop</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <script th:src="@{/js/common.js}"></script>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container mt-5 pt-4">
        <h2 class="mb-4">我的收藏</h2>
        <!-- 空收藏 -->
        <div th:if="${focuses == null or focuses.isEmpty()}">
            <div class="text-center py-5">
                <i class="bi bi-heart" style="font-size:3rem;color:#ccc;"></i>
                <h4 class="mt-3">还没有收藏的商品</h4>
                <p>去 <a th:href="@{/}" class="btn btn-primary btn-sm">首页</a> 发现好物吧！</p>
            </div>
        </div>
        <!-- 收藏列表 -->
        <div class="row" th:if="${not #lists.isEmpty(focuses)}">
            <div class="col-6 col-md-3 mb-4" th:each="f : ${focuses}">
                <div class="card h-100 shadow-sm">
                    <a th:href="@{/goodsDetail(id=${f.goods.id})}">
                        <img th:src="@{/images/{img}(img=${f.goods.picture})}" class="card-img-top" style="height:200px; object-fit:cover;">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate" th:text="${f.goods.name}"></h6>
                        <p class="text-danger fw-bold mb-2">¥<span th:text="${f.goods.currentPrice}"></span>
                            <small class="text-muted text-decoration-line-through ms-1">¥<span th:text="${f.goods.originalPrice}"></span></small>
                        </p>
                        <div class="mt-auto d-flex gap-2">
                            <button class="btn btn-sm btn-primary" th:onclick="'addToCart('+${f.goods.id}+',1,this)'">🛒</button>
                            <button class="btn btn-sm btn-outline-danger" th:onclick="'focusGoods('+${f.goods.id}+',this)'">取消收藏</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
