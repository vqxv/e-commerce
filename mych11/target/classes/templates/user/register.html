<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background: linear-gradient(135deg, #f5f0ff, #ede6ff, #f8f4ff, #e8e0ff, #f5f0ff); background-size: 400% 400%; animation: bgFlow 10s ease infinite; min-height: 100vh;">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5 pt-4" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header text-white text-center" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                <h4 class="mb-0">新用户注册</h4>
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form id="registerForm" th:action="@{/user/register}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="请输入邮箱">
                        <div class="invalid-feedback" id="emailFeedback"></div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码（至少6位）">
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">确认密码</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required placeholder="请再次输入密码">
                        <div class="invalid-feedback" id="pwdFeedback"></div>
                    </div>
                    <div class="mb-3 row">
                        <div class="col-7">
                            <label for="validateCode" class="form-label">验证码</label>
                            <input type="text" class="form-control" id="validateCode" name="code" required maxlength="4" placeholder="验证码">
                        </div>
                        <div class="col-5 d-flex align-items-end">
                            <img th:src="@{/validateCode}" id="codeImg" alt="验证码" style="height:38px; cursor:pointer; border:1px solid #ddd;" onclick="this.src='/validateCode?'+Math.random()">
                            <small class="ms-1" style="cursor:pointer;" onclick="document.getElementById('codeImg').click()">看不清</small>
                        </div>
                    </div>
                    <button type="submit" class="btn w-100 text-white d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #667eea, #764ba2); height: 42px;">注 册</button>
                </form>
                <div class="mt-3 text-center">
                    已有账号？<a th:href="@{/user/toLogin}">立即登录</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const code = document.getElementById('validateCode').value.trim();

            // 前端校验
            document.getElementById('email').classList.remove('is-invalid');
            document.getElementById('confirmPassword').classList.remove('is-invalid');
            if (password !== confirmPassword) {
                document.getElementById('pwdFeedback').textContent = '两次密码不一致';
                document.getElementById('confirmPassword').classList.add('is-invalid');
                return;
            }
            if (code.length !== 4) {
                alert('请输入4位验证码');
                return;
            }

            // 检查邮箱唯一性
            fetch('/user/isUse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email)
            })
            .then(res => res.text())
            .then(data => {
                if (data === 'no') {
                    document.getElementById('emailFeedback').textContent = '邮箱已被注册';
                    document.getElementById('email').classList.add('is-invalid');
                } else {
                    this.submit();
                }
            });
        });
    </script>
<style> @keyframes bgFlow { 0% { background-position: 0% 50%; } 25% { background-position: 100% 50%; } 50% { background-position: 100% 100%; } 75% { background-position: 0% 100%; } 100% { background-position: 0% 50%; } } </style>
</body>
</html>
