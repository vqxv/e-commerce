<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>商品管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="~{admin/layout :: admin-css}"></th:block>
</head>
<body>
<div class="admin-app">
    <div class="admin-sidebar">
        <div class="brand">管理后台</div>
        <nav class="nav-menu">
            <a class="nav-link" th:href="@{/admin/dashboard}"><i>&#128202;</i>仪表盘</a>
            <a class="nav-link active" th:href="@{/admin/goods}"><i>&#128230;</i>商品管理</a>
            <a class="nav-link" th:href="@{/admin/types}"><i>&#127991;</i>分类管理</a>
            <a class="nav-link" th:href="@{/admin/orders}"><i>&#128203;</i>订单管理</a>
            <a class="nav-link" th:href="@{/admin/users}"><i>&#128101;</i>用户管理</a>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 5px 15px;">
            <a class="nav-link" href="/"><i>&#127968;</i>返回首页</a>
        </nav>
    </div>
    <div class="admin-main">
        <div class="admin-topbar">
            <h4 class="mb-0">商品管理</h4>
            <div class="user-info">
                <span sec:authorize="isAuthenticated()" class="text-muted me-3" th:text="${#authentication.name}"></span>
                <a th:href="@{/user/logout}" class="btn-admin btn-sm">退出</a>
            </div>
        </div>
        <div class="admin-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">商品列表</h5>
                <button class="btn btn-admin" onclick="openAddModal()">添加商品</button>
            </div>
            <div class="table-custom">
                <table class="table table-hover mb-0">
                    <thead><tr><th>ID</th><th>图片</th><th>名称</th><th>原价</th><th>现价</th><th>库存</th><th>推荐</th><th>广告</th><th>操作</th></tr></thead>
                    <tbody id="goodsTableBody"></tbody>
                </table>
            </div>
            <!-- 分页控件 -->
            <div class="d-flex justify-content-center align-items-center mt-3 gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="prevPageBtn" onclick="changePage(currentPage - 1)">上一页</button>
                <span id="pageInfo" class="text-muted">第 1 页</span>
                <button class="btn btn-sm btn-outline-secondary" id="nextPageBtn" onclick="changePage(currentPage + 1)">下一页</button>
                <div class="input-group" style="width: 150px;">
                    <input type="number" class="form-control form-control-sm" id="gotoPageInput" placeholder="页码" min="1" style="border-radius:20px 0 0 20px;">
                    <button class="btn btn-sm btn-admin" onclick="gotoPage()" style="border-radius:0 20px 20px 0;">跳转</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="goodsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;">
                <h5 class="modal-title" id="modalTitle">添加商品</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="goodsForm" enctype="multipart/form-data">
                    <input type="hidden" id="goodsId">
                    <div class="mb-3"><label class="form-label">名称</label><input type="text" class="form-control" id="goodsName" required></div>
                    <div class="row mb-3">
                        <div class="col"><label class="form-label">原价</label><input type="number" step="0.01" class="form-control" id="originalPrice" required></div>
                        <div class="col"><label class="form-label">现价</label><input type="number" step="0.01" class="form-control" id="currentPrice" required></div>
                    </div>
                    <div class="mb-3"><label class="form-label">库存</label><input type="number" class="form-control" id="goodsStock" required></div>
                    <div class="row mb-3">
                        <div class="col"><label class="form-label">商品类型</label><select class="form-select" id="goodsType"></select></div>
                        <div class="col">
                            <div class="form-check mt-2"><input class="form-check-input" type="checkbox" id="isRecommend"><label class="form-check-label">推荐</label></div>
                            <div class="form-check mt-2"><input class="form-check-input" type="checkbox" id="isAd"><label class="form-check-label">广告</label></div>
                        </div>
                    </div>
                    <div class="mb-3"><label class="form-label">商品图片</label><input type="file" class="form-control" id="goodsImageFile"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-admin" onclick="saveGoods()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modal = new bootstrap.Modal('#goodsModal');
let currentPage = 0;
let totalElements = 0;
let totalPages = 0;

function loadGoods(page) {
    currentPage = page || 0;
    fetch('/admin/goods/list?page=' + currentPage + '&size=5')
        .then(r => r.json())
        .then(function(data) {
            totalElements = data.totalElements || 0;
            totalPages = data.totalPages || 1;
            var tbody = document.getElementById('goodsTableBody');
            tbody.innerHTML = '';
            (data.content || []).forEach(function(g) {
                tbody.innerHTML += '<tr>' +
                    '<td>' + g.id + '</td>' +
                    '<td><img src="/images/' + (g.picture || 'default.jpg') + '" width="50" class="img-thumbnail"></td>' +
                    '<td>' + g.name + '</td>' +
                    '<td>¥' + g.originalPrice + '</td>' +
                    '<td class="text-danger fw-bold">¥' + g.currentPrice + '</td>' +
                    '<td>' + g.stock + '</td>' +
                    '<td>' + (g.isRecommend ? '是' : '否') + '</td>' +
                    '<td>' + (g.isAdvertisement ? '是' : '否') + '</td>' +
                    '<td><button class="btn btn-sm btn-primary" onclick="editGoods(' + JSON.stringify(g).replace(/'/g, "&#39;") + ')">编辑</button> ' +
                    '<button class="btn btn-sm btn-danger" onclick="deleteGoods(' + g.id + ')">删除</button></td></tr>';
            });
            updatePagination();
        });
}

function updatePagination() {
    var pageNum = currentPage + 1;
    document.getElementById('pageInfo').textContent = '共 ' + totalElements + ' 条，第 ' + pageNum + '/' + totalPages + ' 页';
    document.getElementById('prevPageBtn').disabled = (currentPage <= 0);
    document.getElementById('nextPageBtn').disabled = (currentPage >= totalPages - 1);
    document.getElementById('gotoPageInput').max = totalPages;
}

function changePage(newPage) {
    if (newPage < 0 || newPage >= totalPages) return;
    loadGoods(newPage);
}

function gotoPage() {
    var input = document.getElementById('gotoPageInput');
    var pageNum = parseInt(input.value) - 1;
    if (pageNum >= 0 && pageNum < totalPages) {
        loadGoods(pageNum);
        input.value = '';
    }
}

function openAddModal() {
    document.getElementById('goodsForm').reset();
    document.getElementById('goodsId').value = '';
    document.getElementById('modalTitle').textContent = '添加商品';
    loadTypeOptions();
    modal.show();
}

function editGoods(g) {
    document.getElementById('goodsId').value = g.id;
    document.getElementById('goodsName').value = g.name;
    document.getElementById('originalPrice').value = g.originalPrice;
    document.getElementById('currentPrice').value = g.currentPrice;
    document.getElementById('goodsStock').value = g.stock;
    document.getElementById('isRecommend').checked = g.isRecommend === 1;
    document.getElementById('isAd').checked = g.isAdvertisement === 1;
    document.getElementById('modalTitle').textContent = '编辑商品';
    loadTypeOptions(g.goodsType ? g.goodsType.id : null);
    modal.show();
}

function loadTypeOptions(selectedId) {
    fetch('/admin/types/list').then(r => r.json()).then(function(types) {
        var sel = document.getElementById('goodsType');
        sel.innerHTML = types.map(function(t) {
            return '<option value="' + t.id + '"' + (t.id === selectedId ? ' selected' : '') + '>' + t.typename + '</option>';
        }).join('');
    });
}

function saveGoods() {
    var id = document.getElementById('goodsId').value;
    var fd = new FormData();
    if (id) fd.append('id', id);
    fd.append('name', document.getElementById('goodsName').value);
    fd.append('originalPrice', document.getElementById('originalPrice').value);
    fd.append('currentPrice', document.getElementById('currentPrice').value);
    fd.append('stock', document.getElementById('goodsStock').value);
    fd.append('isRecommend', document.getElementById('isRecommend').checked ? 1 : 0);
    fd.append('isAdvertisement', document.getElementById('isAd').checked ? 1 : 0);
    fd.append('goodsType.id', document.getElementById('goodsType').value);
    var fi = document.getElementById('goodsImageFile');
    if (fi.files.length > 0) fd.append('file', fi.files[0]);
    var url = id ? '/admin/goods/update' : '/admin/goods/add';
    fetch(url, { method: 'POST', body: fd }).then(r => r.json()).then(function(res) {
        if (res.message) { alert(res.message); modal.hide(); loadGoods(currentPage); }
        else { alert(res.error || '操作失败'); }
    });
}

function deleteGoods(id) {
    if (!confirm('确定删除此商品？')) return;
    fetch('/admin/goods/delete/' + id, { method: 'POST' }).then(r => r.json()).then(function(res) {
        if (res.result === 'ok') loadGoods(currentPage);
        else alert('删除失败，商品可能有关联数据');
    });
}

loadGoods();
</script>
</body>
</html>
