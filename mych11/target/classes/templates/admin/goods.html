<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>商品管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="~{admin/layout :: admin-css}"></th:block>
</head>
<body>
<div class="admin-app">
    <div class="admin-sidebar">
        <div class="brand">管理后台</div>
        <nav class="nav-menu">
            <a class="nav-link" th:href="@{/admin/dashboard}"><i>&#128202;</i>仪表盘</a>
            <a class="nav-link active" th:href="@{/admin/goods}"><i>&#128230;</i>商品管理</a>
            <a class="nav-link" th:href="@{/admin/types}"><i>&#127991;</i>分类管理</a>
            <a class="nav-link" th:href="@{/admin/orders}"><i>&#128203;</i>订单管理</a>
            <a class="nav-link" th:href="@{/admin/users}"><i>&#128101;</i>用户管理</a>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 5px 15px;">
            <a class="nav-link" href="/"><i>&#127968;</i>返回首页</a>
        </nav>
    </div>
    <div class="admin-main">
        <div class="admin-topbar">
            <h4 class="mb-0">商品管理</h4>
            <div class="user-info">
                <span sec:authorize="isAuthenticated()" class="text-muted me-3" th:text="${#authentication.name}"></span>
                <a th:href="@{/user/logout}" class="btn-admin btn-sm">退出</a>
            </div>
        </div>
        <div class="admin-content">
            <!-- 添加商品按钮触发模态框 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">商品列表</h5>
                <button class="btn btn-admin" data-bs-toggle="modal" data-bs-target="#addGoodsModal">+ 添加商品</button>
            </div>
            <div class="table-custom">
                <table class="table table-hover mb-0">
                    <thead><tr><th>ID</th><th>图片</th><th>名称</th><th>原价</th><th>现价</th><th>库存</th><th>推荐</th><th>广告</th><th>操作</th></tr></thead>
                    <tbody id="goodsTableBody"></tbody>
                </table>
            </div>
            <!-- 分页控件 -->
            <div class="d-flex justify-content-center align-items-center mt-3 gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="prevPageBtn" onclick="changePage(currentPage - 1)">上一页</button>
                <span id="pageInfo" class="text-muted">第 1 页</span>
                <button class="btn btn-sm btn-outline-secondary" id="nextPageBtn" onclick="changePage(currentPage + 1)">下一页</button>
                <div class="input-group" style="width: 150px;">
                    <input type="number" class="form-control form-control-sm" id="gotoPageInput" placeholder="页码" min="1" style="border-radius:20px 0 0 20px;">
                    <button class="btn btn-sm btn-admin" onclick="gotoPage()" style="border-radius:0 20px 20px 0;">跳转</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 添加商品模态框 -->
<div class="modal fade" id="addGoodsModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">添加商品</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="addGoodsForm" enctype="multipart/form-data">
            <div class="mb-3"><label>名称</label><input type="text" name="name" class="form-control" required></div>
            <div class="row mb-3"><div class="col"><label>原价</label><input type="number" step="0.01" name="originalPrice" class="form-control" required></div><div class="col"><label>现价</label><input type="number" step="0.01" name="currentPrice" class="form-control" required></div></div>
            <div class="mb-3"><label>库存</label><input type="number" name="stock" class="form-control" required></div>
            <div class="row mb-3"><div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="isRecommend" value="1"><label class="form-check-label">推荐</label></div></div><div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="isAdvertisement" value="1"><label class="form-check-label">广告</label></div></div></div>
            <div class="mb-3"><label>类型</label><select name="goodsType.id" class="form-control" id="typeSelect"></select></div>
            <div class="mb-3"><label>图片</label><input type="file" name="file" class="form-control" required></div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-admin" onclick="addGoods()">确认添加</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentPage = 0;
let totalElements = 0;
let totalPages = 0;
const PAGE_SIZE = 10;

function loadGoods(page) {
    currentPage = page || 0;
    fetch('/admin/goods/list?page=' + currentPage + '&size=' + PAGE_SIZE)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            totalElements = data.totalElements || 0;
            totalPages = data.totalPages || 1;
            var tbody = document.getElementById('goodsTableBody');
            tbody.innerHTML = '';
            var items = data.content || [];
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">暂无商品数据</td></tr>';
            } else {
                items.forEach(function(g) {
                    var imgUrl = g.picture ? '/images/' + g.picture : '/images/book1.jpg';
                    tbody.innerHTML += '<tr>' +
                        '<td>' + g.id + '</td>' +
                        '<td><img src="' + imgUrl + '" style="width:50px;height:50px;object-fit:cover;border-radius:5px;"></td>' +
                        '<td>' + (g.name || '-') + '</td>' +
                        '<td>' + (g.originalPrice || 0) + '</td>' +
                        '<td>' + (g.currentPrice || 0) + '</td>' +
                        '<td>' + (g.stock || 0) + '</td>' +
                        '<td>' + (g.isRecommend ? '是' : '否') + '</td>' +
                        '<td>' + (g.isAdvertisement ? '是' : '否') + '</td>' +
                        '<td><button class="btn btn-sm btn-danger" onclick="deleteGoods(' + g.id + ')">删除</button></td></tr>';
                });
            }
            updatePagination();
        })
        .catch(function(e) {
            console.error('加载商品失败:', e);
            document.getElementById('goodsTableBody').innerHTML = '<tr><td colspan="9" class="text-center text-muted">暂无商品数据</td></tr>';
        });
}

function updatePagination() {
    var pageNum = currentPage + 1;
    document.getElementById('pageInfo').textContent = '共 ' + totalElements + ' 条，第 ' + pageNum + '/' + totalPages + ' 页';
    document.getElementById('prevPageBtn').disabled = (currentPage <= 0);
    document.getElementById('nextPageBtn').disabled = (currentPage >= totalPages - 1);
    document.getElementById('gotoPageInput').max = totalPages;
}

function changePage(newPage) {
    if (newPage < 0 || newPage >= totalPages) return;
    loadGoods(newPage);
}

function gotoPage() {
    var input = document.getElementById('gotoPageInput');
    var pageNum = parseInt(input.value) - 1;
    if (pageNum >= 0 && pageNum < totalPages) {
        loadGoods(pageNum);
        input.value = '';
    }
}

function loadTypesForSelect() {
    fetch('/admin/types/list').then(r => r.json()).then(function(types) {
        var sel = document.getElementById('typeSelect');
        sel.innerHTML = '';
        types.forEach(function(t) { sel.innerHTML += '<option value="' + t.id + '">' + t.typename + '</option>'; });
    });
}

function addGoods() {
    var form = document.getElementById('addGoodsForm');
    var fd = new FormData(form);
    fetch('/admin/goods/add', { method: 'POST', body: fd })
        .then(r => r.json()).then(function(res) {
            if (res.message) {
                alert(res.message);
                var modal = bootstrap.Modal.getInstance(document.getElementById('addGoodsModal'));
                modal.hide();
                loadGoods(0);
            } else { alert(res.error || '添加失败'); }
        });
}

function deleteGoods(id) {
    if (!confirm('确定删除该商品？')) return;
    fetch('/admin/goods/delete/' + id, { method: 'POST' }).then(r => r.json()).then(function(res) {
        if (res.result === 'ok') loadGoods(currentPage);
        else alert('删除失败');
    });
}

loadTypesForSelect();
loadGoods();
</script>
</body>
</html>
