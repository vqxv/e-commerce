<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>分类管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="~{admin/layout :: admin-css}"></th:block>
</head>
<body>
<div class="admin-app">
    <div class="admin-sidebar">
        <div class="brand">管理后台</div>
        <nav class="nav-menu">
            <a class="nav-link" th:href="@{/admin/dashboard}"><i>&#128202;</i>仪表盘</a>
            <a class="nav-link" th:href="@{/admin/goods}"><i>&#128230;</i>商品管理</a>
            <a class="nav-link active" th:href="@{/admin/types}"><i>&#127991;</i>分类管理</a>
            <a class="nav-link" th:href="@{/admin/orders}"><i>&#128203;</i>订单管理</a>
            <a class="nav-link" th:href="@{/admin/users}"><i>&#128101;</i>用户管理</a>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 5px 15px;">
            <a class="nav-link" href="/"><i>&#127968;</i>返回首页</a>
        </nav>
    </div>
    <div class="admin-main">
        <div class="admin-topbar">
            <h4 class="mb-0">分类管理</h4>
            <div class="user-info">
                <span sec:authorize="isAuthenticated()" class="text-muted me-3" th:text="${#authentication.name}"></span>
                <a th:href="@{/user/logout}" class="btn-admin btn-sm">退出</a>
            </div>
        </div>
        <div class="admin-content">
            <div class="d-flex gap-2 mb-3">
                <input type="text" id="typeNameInput" class="form-control" placeholder="新类型名称">
                <button class="btn btn-admin" onclick="addType()" style="white-space: nowrap;">添加</button>
            </div>
            <div class="table-custom">
                <table class="table table-hover mb-0">
                    <thead><tr><th>ID</th><th>名称</th><th>操作</th></tr></thead>
                    <tbody id="typeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function loadTypes() {
    fetch('/admin/types/list').then(r => r.json()).then(function(types) {
        document.getElementById('typeTableBody').innerHTML = types.map(function(t) {
            return '<tr><td>' + t.id + '</td><td>' + t.typename + '</td>' +
                '<td><button class="btn btn-sm btn-danger" onclick="deleteType(' + t.id + ')">删除</button></td></tr>';
        }).join('');
    });
}
function addType() {
    var name = document.getElementById('typeNameInput').value.trim();
    if (!name) return alert('请输入类型名称');
    fetch('/admin/types/add', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: 'name=' + encodeURIComponent(name) })
        .then(r => r.json()).then(function(res) {
            if (res.message) { document.getElementById('typeNameInput').value = ''; loadTypes(); }
            else { alert(res.error || '操作失败'); }
        });
}
function deleteType(id) {
    if (!confirm('确定删除该类型？')) return;
    fetch('/admin/types/delete/' + id, { method: 'POST' }).then(r => r.json()).then(function(res) {
        if (res.result === 'ok') loadTypes();
        else alert('删除失败，类型下有商品');
    });
}
loadTypes();
</script>
</body>
</html>
