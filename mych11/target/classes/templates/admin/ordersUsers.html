<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单与用户管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f5f7fa; }
        .admin-css { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: #2c3e50; color: #fff; flex-shrink: 0; }
        .sidebar .nav-link { color: #bbb; margin: 2px 0; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #34495e; border-radius: 4px; }
        .sidebar .brand { padding: 20px; font-size: 1.4rem; font-weight: bold; text-align: center; border-bottom: 1px solid #3d5166; }
        .main-content { flex: 1; padding: 20px; }
    </style>
</head>
<body>
<div class="admin-css">
    <div class="sidebar">
        <div class="brand">🛒 管理后台</div>
        <nav class="nav flex-column mt-3 px-2">
            <a class="nav-link" th:href="@{/admin/dashboard}">📊 仪表盘</a>
            <a class="nav-link" th:href="@{/admin/goods}">📦 商品管理</a>
            <a class="nav-link" th:href="@{/admin/types}">🏷️ 分类管理</a>
            <a class="nav-link active" th:href="@{/admin/orders}">📋 订单管理</a>
            <a class="nav-link" th:href="@{/admin/users}">👥 用户管理</a>
            <a class="nav-link" href="/" target="_blank">🏠 返回首页</a>
            <a class="nav-link" th:href="@{/user/logout}">🚪 退出登录</a>
        </nav>
    </div>
    <div class="main-content">
        <ul class="nav nav-tabs" id="orderUserTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="orders-tab" data-bs-toggle="tab" data-bs-target="#ordersPane" type="button" role="tab">订单管理</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="users-tab" data-bs-toggle="tab" data-bs-target="#usersPane" type="button" role="tab">用户管理</button>
            </li>
        </ul>
        <div class="tab-content mt-3" id="orderUserTabContent">
            <div class="tab-pane fade show active" id="ordersPane" role="tabpanel">
                <table class="table table-hover bg-white rounded shadow-sm">
                    <thead><tr><th>订单号</th><th>用户邮箱</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
                    <tbody id="orderTableBody"><tr><td colspan="5" class="text-center">加载中...</td></tr></tbody>
                </table>
            </div>
            <div class="tab-pane fade" id="usersPane" role="tabpanel">
                <table class="table table-hover bg-white rounded shadow-sm">
                    <thead><tr><th>ID</th><th>邮箱</th><th>角色</th></tr></thead>
                    <tbody id="userTableBody"><tr><td colspan="3" class="text-center">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function loadOrders() {
        fetch('/admin/orders/list')
            .then(r => r.json())
            .then(orders => {
                const statusMap = {0: '<span class="badge bg-warning text-dark">待支付</span>', 1: '<span class="badge bg-success">已支付</span>', 2: '<span class="badge bg-secondary">已取消</span>'};
                document.getElementById('orderTableBody').innerHTML = orders.map(o => '<tr>' +
                    '<td>' + o.id + '</td>' +
                    '<td>' + (o.user ? o.user.email : '-') + '</td>' +
                    '<td>¥' + (o.totalAmount || 0) + '</td>' +
                    '<td>' + (statusMap[o.status] || o.status) + '</td>' +
                    '<td>' + (o.createTime ? new Date(o.createTime).toLocaleString() : '-') + '</td>' +
                '</tr>').join('');
            }).catch(function() {
                document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">加载失败</td></tr>';
            });
    }

    function loadUsers() {
        fetch('/admin/users/list')
            .then(r => r.json())
            .then(users => {
                document.getElementById('userTableBody').innerHTML = users.map(u => '<tr>' +
                    '<td>' + u.id + '</td>' +
                    '<td>' + u.email + '</td>' +
                    '<td><span class="badge ' + (u.role === 'ADMIN' ? 'bg-danger' : 'bg-primary') + '">' + (u.role || 'USER') + '</span></td>' +
                '</tr>').join('');
            }).catch(function() {
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="3" class="text-center text-danger">加载失败</td></tr>';
            });
    }

    loadOrders();
    loadUsers();
</script>
</body>
</html>
