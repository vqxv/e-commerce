<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-container"></div>

<main class="container mt-5 pt-4">
    <h3 id="search-title" class="mb-4">搜索结果</h3>
    <div id="result-list" class="row row-cols-2 row-cols-md-4 g-3"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script>
    if (typeof loadHeader === 'function') loadHeader('header-container');

    const params = new URLSearchParams(window.location.search);
    const keyword = params.get('keyword');
    const typeId = params.get('typeId');
    let url = '/api/goods?';
    if (keyword) {
        url += 'keyword=' + encodeURIComponent(keyword);
        document.getElementById('search-title').innerHTML = `搜索结果：<span class="text-primary">${keyword}</span>`;
    } else if (typeId) {
        url += 'typeId=' + typeId;
        // 获取分类名称显示在标题
        fetch('/api/goodstypes')
            .then(res => res.json())
            .then(types => {
                const t = types.find(t => t.id == typeId);
                document.getElementById('search-title').textContent = t ? t.name : '分类商品';
            });
    }

    fetch(url)
        .then(res => res.json())
        .then(goods => {
            let html = '';
            if (goods.length) {
                goods.forEach(g => {
                    html += `
                    <div class="col">
                        <div class="card h-100 shadow-sm">
                            <a href="goods-detail.html?id=${g.id}"><img src="images/${g.picture}" class="card-img-top" alt="商品图片"></a>
                            <div class="card-body d-flex flex-column">
                                <h6 class="card-title">${g.name}</h6>
                                <p class="card-text">
                                    <span class="price-current">¥${g.currentPrice}</span>
                                    <small class="price-original ms-2">¥${g.originalPrice}</small>
                                </p>
                                <div class="mt-auto d-flex gap-2">
                                    <button class="btn btn-sm btn-primary" onclick="addToCart(${g.id},1,this)">🛒 购物车</button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="focusGoods(${g.id},this)">❤️ 收藏</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            } else {
                html = '<div class="alert alert-warning">未找到相关商品</div>';
            }
            document.getElementById('result-list').innerHTML = html;
        })
        .catch(() => {
            document.getElementById('result-list').innerHTML = '<div class="alert alert-danger">加载失败</div>';
        });
</script>
</body>
</html>
