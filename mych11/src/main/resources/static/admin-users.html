<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-admin { background: linear-gradient(135deg, #667eea, #764ba2); }
        .navbar-admin .nav-link, .navbar-admin .navbar-brand { color: white !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-admin">
    <div class="container">
        <a class="navbar-brand" href="#">管理后台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="admin.html">仪表盘</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-goods.html">商品管理</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-orders.html">订单管理</a></li>
                <li class="nav-item"><a class="nav-link active" href="admin-users.html">用户管理</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>用户列表</h2>
    <table class="table table-hover">
        <thead><tr><th>ID</th><th>邮箱</th><th>角色</th></tr></thead>
        <tbody id="usersBody"></tbody>
    </table>
</div>
<script>
    async function loadUsers() {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        document.getElementById('usersBody').innerHTML = users.map(u => `<tr>
            <td>${u.id}</td><td>${u.email}</td><td>${u.role}</td>
        </tr>`).join('');
    }
    loadUsers();
</script>
</body>
</html>
