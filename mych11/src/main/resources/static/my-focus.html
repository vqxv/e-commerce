<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/index.html">E-Shop</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/index.html">首页</a>
                <a class="nav-link" href="/cart.html">购物车</a>
                <a class="nav-link active" href="/my-focus.html">收藏</a>
                <a class="nav-link" href="/my-orders.html">订单</a>
                <a class="nav-link" href="/user-info.html">个人</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 pt-4">
        <h2 class="mb-4">我的收藏</h2>
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-heart" style="font-size:3rem;color:#ccc;"></i>
            <h4 class="mt-3">还没有收藏的商品</h4>
            <p>去 <a href="/index.html" class="btn btn-primary btn-sm">首页</a> 发现好物吧！</p>
        </div>
        <!-- 收藏网格 -->
        <div id="focusGrid" class="row"></div>
    </div>

    <script>
        async function loadFocus() {
            try {
                const resp = await fetch('/api/focus');
                if (!resp.ok) { window.location.href='/login.html'; return; }
                const data = await resp.json();
                const grid = document.getElementById('focusGrid');
                const empty = document.getElementById('emptyState');
                if (!data || data.length === 0) {
                    empty.classList.remove('d-none');
                    grid.innerHTML = '';
                    return;
                }
                empty.classList.add('d-none');
                grid.innerHTML = data.map(f => `
                    <div class="col-6 col-md-3 mb-4">
                        <div class="card h-100 shadow-sm">
                            <a href="/goods-detail.html?id=${f.goodsId}">
                                <img src="/images/${f.picture}" class="card-img-top" style="height:200px;object-fit:cover;" alt="${f.name}">
                            </a>
                            <div class="card-body d-flex flex-column">
                                <h6 class="card-title text-truncate">${f.name}</h6>
                                <p class="text-danger fw-bold mb-1">¥${f.currentPrice}
                                    <small class="text-muted text-decoration-line-through ms-1">¥${f.originalPrice}</small>
                                </p>
                                <div class="mt-auto d-flex gap-2">
                                    <button class="btn btn-sm btn-primary" onclick="addToCart(${f.goodsId})">🛒</button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="removeFocus(${f.goodsId})">取消收藏</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function removeFocus(goodsId) {
            await fetch('/api/focus/' + goodsId, { method: 'DELETE' });
            loadFocus();
        }

        function addToCart(goodsId) {
            fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'goodsId=' + goodsId + '&quantity=1'
            }).then(r => r.json()).then(data => {
                if (data.success) alert('已加入购物车');
            });
        }

        document.addEventListener('DOMContentLoaded', loadFocus);
    </script>
</body>
</html>
