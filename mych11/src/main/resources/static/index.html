<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- 公共头部动态插入 -->
<div id="header-container"></div>

<!-- 轮播图容器 -->
<div id="adCarousel" class="carousel slide mt-4" data-bs-ride="carousel" style="display:none;">
    <div class="carousel-indicators" id="carousel-indicators"></div>
    <div class="carousel-inner" id="carousel-inner"></div>
    <button class="carousel-control-prev" type="button" data-bs-target="#adCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#adCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
    </button>
</div>

<main class="container mt-5 pt-4">
    <!-- 分类下拉菜单动态渲染 -->
    <div class="mb-4" id="type-dropdown"></div>

    <!-- 推荐商品 -->
    <section class="mb-5">
        <h3 class="mb-3">🔥 推荐商品</h3>
        <div id="recommend-goods" class="row row-cols-2 row-cols-md-4 g-3"></div>
    </section>

    <!-- 最新商品 -->
    <section class="mb-5">
        <h3 class="mb-3">✨ 最新上架</h3>
        <div id="latest-goods" class="row row-cols-2 row-cols-md-4 g-3"></div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script>
    // 加载公共头部（假设 common.js 提供 loadHeader() 函数）
    if (typeof loadHeader === 'function') loadHeader('header-container');

    // 加载分类菜单
    fetch('/api/goodstypes')
        .then(res => res.json())
        .then(types => {
            if (types.length) {
                let html = `<div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">商品分类</button>
                    <ul class="dropdown-menu">`;
                types.forEach(t => html += `<li><a class="dropdown-item" href="search.html?typeId=${t.id}">${t.name}</a></li>`);
                html += `</ul></div>`;
                document.getElementById('type-dropdown').innerHTML = html;
            }
        });

    // 加载所有商品，前端筛选推荐、最新、广告
    fetch('/api/goods')
        .then(res => res.json())
        .then(goods => {
            const adGoods = goods.filter(g => g.isAdvertisement === 1);
            const recommendGoods = goods.filter(g => g.isRecommend === 1);
            // 最新：按 id 倒序取前 10
            const latestGoods = [...goods].sort((a, b) => b.id - a.id).slice(0, 10);

            // 轮播图渲染
            if (adGoods.length > 0) {
                document.getElementById('adCarousel').style.display = 'block';
                let indicators = '', items = '';
                adGoods.forEach((g, i) => {
                    indicators += `<button type="button" data-bs-target="#adCarousel" data-bs-slide-to="${i}" ${i===0?'class="active"':''}></button>`;
                    items += `<div class="carousel-item ${i===0?'active':''}">
                        <a href="goods-detail.html?id=${g.id}"><img src="images/${g.picture}" class="d-block w-100" style="height:350px;object-fit:cover;"></a>
                    </div>`;
                });
                document.getElementById('carousel-indicators').innerHTML = indicators;
                document.getElementById('carousel-inner').innerHTML = items;
            }

            // 商品卡片渲染函数
            function renderCards(containerId, goodsArray) {
                let html = '';
                if (goodsArray.length === 0) {
                    html = '<p class="text-muted">暂无商品</p>';
                } else {
                    goodsArray.forEach(g => {
                        html += `
                        <div class="col">
                            <div class="card h-100 shadow-sm">
                                <a href="goods-detail.html?id=${g.id}"><img src="images/${g.picture}" class="card-img-top" alt="商品图片"></a>
                                <div class="card-body d-flex flex-column">
                                    <h6 class="card-title">${g.name}</h6>
                                    <p class="card-text">
                                        <span class="price-current">¥${g.currentPrice}</span>
                                        <small class="price-original ms-2">¥${g.originalPrice}</small>
                                    </p>
                                    <div class="mt-auto d-flex gap-2">
                                        <button class="btn btn-sm btn-primary" onclick="addToCart(${g.id},1,this)">🛒 购物车</button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="focusGoods(${g.id},this)">❤️ 收藏</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById(containerId).innerHTML = html;
            }

            renderCards('recommend-goods', recommendGoods);
            renderCards('latest-goods', latestGoods);
        })
        .catch(err => {
            document.getElementById('recommend-goods').innerHTML = '<div class="alert alert-danger">加载失败，请刷新重试</div>';
        });
</script>
</body>
</html>
