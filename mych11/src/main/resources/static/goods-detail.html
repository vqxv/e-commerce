<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-container"></div>

<main class="container mt-5 pt-4" id="detail-content">
    <div class="text-center py-5">加载中...</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script>
    if (typeof loadHeader === 'function') loadHeader('header-container');

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) {
        document.getElementById('detail-content').innerHTML = '<div class="alert alert-danger">缺少商品ID</div>';
    } else {
        fetch('/api/goods/' + id)
            .then(res => res.json())
            .then(g => {
                let html = `
                <div class="row g-5">
                    <div class="col-md-6">
                        <img src="images/${g.picture}" class="img-fluid rounded shadow" alt="${g.name}">
                    </div>
                    <div class="col-md-6">
                        <h2>${g.name}</h2>
                        ${g.typeName ? `<p class="text-muted">分类：${g.typeName}</p>` : ''}
                        <div class="mb-3">
                            <span class="text-decoration-line-through text-muted h5">原价 ¥${g.originalPrice}</span>
                            <span class="text-danger fw-bold h4 ms-3">¥${g.currentPrice}</span>
                        </div>
                        <p>库存数量：<span class="fw-bold">${g.stock}</span> 件</p>
                        ${g.stock > 0 ? `
                        <div class="input-group mb-3" style="max-width:200px;">
                            <span class="input-group-text">数量</span>
                            <input type="number" id="quantity" class="form-control" value="1" min="1" max="${g.stock}">
                        </div>
                        <div class="d-grid gap-2 d-md-flex">
                            <button class="btn btn-lg btn-primary" onclick="addToCart(${g.id}, document.getElementById('quantity').value, this)">加入购物车</button>
                            <button class="btn btn-lg btn-outline-danger" onclick="focusGoods(${g.id}, this)">收藏商品</button>
                        </div>` : `<button class="btn btn-lg btn-secondary" disabled>暂时缺货</button>`}
                    </div>
                </div>`;
                document.getElementById('detail-content').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('detail-content').innerHTML = '<div class="alert alert-danger">商品加载失败</div>';
            });
    }
</script>
</body>
</html>
