<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>仪表盘 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .carousel { display: none !important; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container mt-5 pt-4">
    <h2 class="mb-4">销售统计</h2>
    <div class="row">
        <div class="col-md-8">
            <div id="mainChart" style="width:100%;height:400px;"></div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    fetch('/admin/salesData')
        .then(res => res.json())
        .then(data => {
            const chart = echarts.init(document.getElementById('mainChart'));
            chart.setOption({
                title: { text: '月销售额' },
                tooltip: {},
                xAxis: { data: data.categories },
                yAxis: {},
                series: [{ name: '销售额', type: 'bar', data: data.values }]
            });
            window.addEventListener('resize', () => chart.resize());
        });
</script>
</body>
</html>
