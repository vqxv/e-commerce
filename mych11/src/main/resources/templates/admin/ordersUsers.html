<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单与用户管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .carousel { display: none !important; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container mt-5 pt-4">
    <ul class="nav nav-tabs" id="orderUserTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="orders-tab" data-bs-toggle="tab" data-bs-target="#ordersPane" type="button" role="tab" aria-controls="ordersPane" aria-selected="true">订单管理</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="users-tab" data-bs-toggle="tab" data-bs-target="#usersPane" type="button" role="tab" aria-controls="usersPane" aria-selected="false">用户管理</button>
        </li>
    </ul>
    <div class="tab-content mt-3" id="orderUserTabContent">
        <div class="tab-pane fade show active" id="ordersPane" role="tabpanel" aria-labelledby="orders-tab">
            <table class="table table-hover">
                <thead><tr><th>订单号</th><th>用户邮箱</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>
        <div class="tab-pane fade" id="usersPane" role="tabpanel" aria-labelledby="users-tab">
            <table class="table table-hover">
                <thead><tr><th>ID</th><th>邮箱</th><th>注册时间</th></tr></thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function loadOrders() {
        fetch('/admin/orders/list')
            .then(r => r.json())
            .then(orders => {
                const statusMap = {0: '待支付', 1: '已支付', 2: '已取消'};
                document.getElementById('orderTableBody').innerHTML = orders.map(o => `<tr>
                    <td>${o.id}</td>
                    <td>${o.user ? o.user.email : ''}</td>
                    <td>¥${o.totalAmount}</td>
                    <td>${statusMap[o.status] || o.status}</td>
                    <td>${new Date(o.createTime).toLocaleString()}</td>
                </tr>`).join('');
            });
    }

    function loadUsers() {
        fetch('/admin/users/list')
            .then(r => r.json())
            .then(users => {
                document.getElementById('userTableBody').innerHTML = users.map(u => `<tr>
                    <td>${u.id}</td><td>${u.email}</td><td>${new Date(u.createTime).toLocaleString()}</td>
                </tr>`).join('');
            });
    }

    loadOrders();
    loadUsers();
</script>
</body>
</html>
