<div th:fragment="header" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <nav class="navbar navbar-expand-lg fixed-top" style="background: linear-gradient(135deg, #667eea, #764ba2);">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" th:href="@{/}">E-Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown" th:if="${goodsTypeList != null and !goodsTypeList.isEmpty()}">
                        <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">分类</a>
                        <ul class="dropdown-menu">
                            <li th:each="type : ${goodsTypeList}">
                                <a class="dropdown-item" th:href="@{/(typeId=${type.id})}" th:text="${type.typename}"></a>
                            </li>
                        </ul>
                    </li>
                </ul>
                <form th:action="@{/search}" method="get" class="d-flex me-3" style="max-width:240px;">
                    <input class="form-control form-control-sm" type="search" name="keyword" placeholder="搜索..." style="width:160px;border-radius:20px;">
                    <button class="btn btn-outline-light btn-sm ms-1" type="submit" style="width:60px;">搜索</button>
                </form>
                <div class="d-flex gap-2 align-items-center">
                    <a sec:authorize="!isAuthenticated()" th:href="@{/user/toLogin}" class="btn btn-outline-light btn-sm">登录</a>
                    <button sec:authorize="hasRole('USER')" class="btn btn-outline-light btn-sm" onclick="toggleCart()">购物车</button>
                    <a sec:authorize="hasRole('USER')" th:href="@{/cart/myFocus}" class="btn btn-outline-light btn-sm">收藏</a>
                    <a sec:authorize="hasRole('USER')" th:href="@{/cart/myOrders}" class="btn btn-outline-light btn-sm">订单</a>
                    <div sec:authorize="hasRole('USER')" class="dropdown">
                        <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">我的</button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/user/userInfo}">个人信息</a></li>
                            <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#pwdModal">修改密码</a></li>
                            <li><a class="dropdown-item" th:href="@{/user/logout}">退出</a></li>
                        </ul>
                    </div>
                    <a th:href="@{/admin/toLogin}" class="btn btn-outline-warning btn-sm">管理</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-4" th:if="${advertisementGoods != null and !advertisementGoods.isEmpty()}">
        <div id="headerCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button th:each="ad, iterStat : ${advertisementGoods}" type="button" data-bs-target="#headerCarousel" th:data-bs-slide-to="${iterStat.index}" th:classappend="${iterStat.first} ? 'active'"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item" th:each="ad, iterStat : ${advertisementGoods}" th:classappend="${iterStat.first} ? 'active'">
                    <a th:href="@{/goodsDetail(id=${ad.id})}">
                        <img th:src="'images/' + ${ad.picture}" class="d-block w-100" style="height:350px;object-fit:cover;" alt="广告">
                    </a>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#headerCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#headerCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>
    <div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cartSidebar" class="cart-sidebar">
        <div class="d-flex justify-content-between align-items-center p-3 text-white" style="background: linear-gradient(135deg, #667eea, #764ba2);">
            <span>购物车</span>
            <i class="bi bi-x-lg" style="cursor:pointer" onclick="toggleCart()"></i>
        </div>
        <div class="flex-grow-1 p-3 overflow-auto" id="cartItems">
            <p class="text-center text-muted">加载中...</p>
        </div>
        <div class="p-3 border-top">
            <div class="d-flex justify-content-between mb-2">
                <span>合计：</span>
                <span id="cartTotal">¥0.00</span>
            </div>
            <a th:href="@{/cart/view}" class="btn btn-primary w-100">查看购物车</a>
        </div>
    </div>
    <div class="modal fade" id="pwdModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                    <h5 class="modal-title text-white">修改密码</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">原密码</label>
                        <input type="password" id="oldPwd" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" id="newPwd" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="updatePwd()">确认修改</button>
                </div>
            </div>
        </div>
    </div>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
</div>
