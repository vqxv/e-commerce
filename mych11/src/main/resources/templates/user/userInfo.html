<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5 pt-4" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header text-white" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                <h5 class="mb-0">账户信息</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">当前登录邮箱</label>
                    <p class="form-control-plaintext" th:text="${currentUser.email}">user@example.com</p>
                </div>
                <div class="alert alert-light border">
                    <small>如需修改密码，请使用导航栏中的“修改密码”功能。</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
</body>
</html>
