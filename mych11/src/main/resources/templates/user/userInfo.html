<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background: linear-gradient(135deg, #f5f0ff, #ede6ff, #f8f4ff, #e8e0ff, #f5f0ff); background-size: 400% 400%; animation: bgFlow 10s ease infinite; min-height: 100vh;">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5 pt-4" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header text-white" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                <h5 class="mb-0">账户信息</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">当前登录邮箱</label>
                    <p class="form-control-plaintext" th:text="${currentUser.email}">user@example.com</p>
                </div>
            <div class="alert alert-light border">
                <small>如需修改密码，请点击下方按钮。</small>
            </div>
            <div class="text-center mt-4">
                <button class="btn text-white w-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #667eea, #764ba2); height: 42px;" 
                        onclick="showChangePwdModal()">修改密码</button>
            </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
<style> @keyframes bgFlow { 0% { background-position: 0% 50%; } 25% { background-position: 100% 50%; } 50% { background-position: 100% 100%; } 75% { background-position: 0% 100%; } 100% { background-position: 0% 50%; } } </style>
</body>
</html>
