<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #f5f0ff, #ede6ff, #f8f4ff, #e8e0ff, #f5f0ff); background-size: 400% 400%; animation: bgFlow 10s ease infinite; min-height: 100vh;">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container mt-5 pt-4">
        <h2 class="mb-4">我的收藏</h2>
        <!-- 空收藏 -->
        <div th:if="${focuses == null or focuses.isEmpty()}">
            <div class="text-center py-5">
                <i class="bi bi-heart" style="font-size:3rem;color:#ccc;"></i>
                <h4 class="mt-3">还没有收藏的商品</h4>
                <p>去 <a th:href="@{/}" class="btn btn-primary btn-sm">首页</a> 发现好物吧！</p>
            </div>
        </div>
        <!-- 收藏列表 -->
        <div class="row" th:if="${not #lists.isEmpty(focuses)}">
            <div class="col-6 col-md-3 mb-4" th:each="f : ${focuses}">
                <div class="card h-100 shadow-sm">
                    <a th:href="@{/goodsDetail(id=${f.goods.id})}">
                        <img th:src="@{/images/{pic}(pic=${f.goods.picture})}" class="card-img-top" style="height:200px; object-fit:cover;">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate" th:text="${f.goods.name}"></h6>
                        <p class="text-danger fw-bold mb-2">¥<span th:text="${f.goods.currentPrice}"></span>
                            <small class="text-muted text-decoration-line-through ms-1">¥<span th:text="${f.goods.originalPrice}"></span></small>
                        </p>
                        <div class="mt-auto d-flex gap-2">
                            <button class="btn btn-sm btn-primary" th:onclick="'addToCart('+${f.goods.id}+',1,this)'">🛒</button>
                            <button class="btn btn-sm btn-outline-danger" th:onclick="'focusGoodsInPage('+${f.goods.id}+',this)'">取消收藏</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
<style> @keyframes bgFlow { 0% { background-position: 0% 50%; } 25% { background-position: 100% 50%; } 50% { background-position: 100% 100%; } 75% { background-position: 0% 100%; } 100% { background-position: 0% 50%; } } </style>
</body>
</html>
