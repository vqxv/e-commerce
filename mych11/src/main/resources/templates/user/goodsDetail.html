<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${goods.name} + ' - 商品详情'">商品详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background: linear-gradient(135deg, #f5f0ff, #ede6ff, #f8f4ff, #e8e0ff, #f5f0ff); background-size: 400% 400%; animation: bgFlow 10s ease infinite; min-height: 100vh;">

<!-- 公共头部 -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5 pt-4">
    <div class="row g-5">
        <!-- 商品大图 -->
        <div class="col-md-6">
            <img th:src="@{/images/{pic}(pic=${goods.picture})}" class="img-fluid rounded shadow" alt="商品图片">
        </div>
        <!-- 商品信息 -->
        <div class="col-md-6">
            <h2 th:text="${goods.name}">商品名称</h2>
            <p class="text-muted" th:if="${goods.goodsType != null}">
                分类：<span th:text="${goods.goodsType.typename}"></span>
            </p>
            <div class="mb-3">
                <span class="text-decoration-line-through text-muted h5">
                    原价 ¥<span th:text="${#numbers.formatDecimal(goods.originalPrice, 0, 2)}"></span>
                </span>
                <span class="text-danger fw-bold h4 ms-3">
                    ¥<span th:text="${#numbers.formatDecimal(goods.currentPrice, 0, 2)}"></span>
                </span>
            </div>
            <p th:if="${goods.stock > 0}">
                库存数量：<span class="fw-bold" th:text="${goods.stock}"></span> 件
            </p>
            <p th:if="${goods.stock == 0}" class="text-danger fw-bold">暂时缺货</p>
            <div class="input-group mb-3" th:if="${goods.stock > 0}" style="max-width: 200px;">
                <span class="input-group-text">数量</span>
                <input type="number" id="quantity" class="form-control" value="1" min="1" th:max="${goods.stock}">
            </div>
            <div class="d-grid gap-2 d-md-flex" th:if="${goods.stock > 0}">
                <button class="btn btn-lg btn-primary"
                        th:onclick="'addToCart('+${goods.id}+',document.getElementById(\'quantity\').value,this)'">
                    加入购物车
                </button>
                <button class="btn btn-lg btn-outline-danger"
                        th:onclick="'focusGoods('+${goods.id}+',this)'">
                    收藏商品
                </button>
            </div>
            <button class="btn btn-lg btn-secondary" disabled th:if="${goods.stock == 0}">暂时无法购买</button>
        </div>
    </div>
    <!-- 商品描述 -->
    <div class="mt-5" th:if="${goods.description}">
        <h4>商品详情</h4>
        <p class="text-muted" th:text="${goods.description}"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<style> @keyframes bgFlow { 0% { background-position: 0% 50%; } 25% { background-position: 100% 50%; } 50% { background-position: 100% 100%; } 75% { background-position: 0% 100%; } 100% { background-position: 0% 50%; } } </style>
</body>
</html>
