<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>支付</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <script th:src="@{/js/common.js}"></script>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body text-center py-5">
                        <h2 class="mb-3">订单支付</h2>
                        <h4 class="text-muted">订单编号：<span th:text="${order.id}" class="fw-bold text-dark"></span></h4>
                        <h4 class="text-danger mt-4">应付金额：<span th:text="'¥' + ${order.total}" class="display-6"></span></h4>
                        <p class="text-muted mt-3">状态：
                            <span th:if="${order.status == 0}" class="badge bg-warning text-dark">待支付</span>
                            <span th:if="${order.status == 1}" class="badge bg-success">已支付</span>
                        </p>
                        <div th:if="${order.status == 0}">
                            <button class="btn btn-success btn-lg mt-4 px-5" onclick="payOrder()">确认支付</button>
                        </div>
                        <div th:if="${order.status == 1}" class="mt-3">
                            <a th:href="@{/goods/index}" class="btn btn-primary">返回首页继续购物</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
        function payOrder() {
            if (!confirm('确认支付该订单吗？')) return;
            fetch('/cart/pay', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'orderId=' + [[${order.id}]]
            }).then(res => res.text()).then(result => {
                if (result === 'ok') {
                    alert('支付成功！');
                    window.location.href = '/goods/index';
                } else if (result === 'paid') {
                    alert('该订单已支付！');
                    location.reload();
                } else {
                    alert('支付失败，请稍后再试');
                }
            });
        }
    </script>
</body>
</html>
