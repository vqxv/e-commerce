<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background: linear-gradient(135deg, #f5f0ff, #ede6ff, #f8f4ff, #e8e0ff, #f5f0ff); background-size: 400% 400%; animation: bgFlow 10s ease infinite; min-height: 100vh;">

<!-- 公共头部（导航栏、全局搜索、轮播图、购物车侧边栏等） -->
<div th:replace="~{fragments/header :: header}" style="position: relative; z-index: 1;"></div>

<style>
    @keyframes bgFlow {
        0% { background-position: 0% 50%; }
        25% { background-position: 100% 50%; }
        50% { background-position: 100% 100%; }
        75% { background-position: 0% 100%; }
        100% { background-position: 0% 50%; }
    }
    .category-pill {
        transition: all 0.3s ease;
        border: 1px solid #667eea;
        color: #667eea;
        background: rgba(102,126,234,0.08);
        padding: 5px 16px;
        font-size: 0.9rem;
        font-weight: 500;
        border-radius: 20px;
        text-decoration: none;
        white-space: nowrap;
    }
    .category-pill:hover {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border-color: transparent;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(102,126,234,0.3);
    }
    .category-pill.active {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border-color: transparent;
    }
    .section-title {
        display: inline-block;
        position: relative;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .section-title::after {
        content: '';
        display: block;
        width: 60px;
        height: 3px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 2px;
        margin-top: 6px;
    }
    .product-card {
        transition: all 0.3s ease;
        border: 1px solid rgba(102,126,234,0.1);
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(10px);
    }
    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 30px rgba(102,126,234,0.15);
        border-color: rgba(102,126,234,0.2);
    }
    .product-card .card-img-top {
        height: 200px;
        object-fit: cover;
        transition: transform 0.5s ease;
    }
    .product-card:hover .card-img-top {
        transform: scale(1.05);
    }
    .product-card .btn-primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    .product-card .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(102,126,234,0.3);
    }
    .product-card .btn-outline-danger {
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    .price-current {
        font-size: 1.1rem;
        font-weight: 700;
        color: #e74c3c;
    }
    .price-original {
        color: #999;
        text-decoration: line-through;
        font-size: 0.85rem;
    }
</style>

<div class="container mt-4 pt-2">

    <!-- 分类标签（无"商品分类"标题） -->
    <div class="d-flex flex-wrap gap-2 mb-4 justify-content-center">
        <a th:href="@{/search}" 
           class="category-pill"
           th:classappend="${selectedTypeId == null and keyword == null} ? 'active'">全部</a>
        <a th:each="type : ${goodsTypeList}" 
           th:href="@{/search(typeId=${type.id})}"
           class="category-pill" 
           th:text="${type.typename}"></a>
    </div>

    <!-- 搜索栏 -->
    <div class="text-center mb-4">
        <form th:action="@{/search}" method="get" class="d-inline-flex" style="width: 100%; max-width: 500px;">
            <input class="form-control me-2" type="search" name="keyword" placeholder="搜索商品..." aria-label="Search" style="border-radius: 25px; border: 1px solid #667eea; padding: 10px 20px;">
            <button class="btn" type="submit" style="border-radius: 25px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; padding: 10px 28px; font-weight: 500;">搜索</button>
        </form>
    </div>

    <!-- 推荐商品 -->
    <section class="mb-5">
        <h3 class="mb-4 section-title">🔥 推荐商品</h3>
        <div th:if="${not #lists.isEmpty(recommendGoods)}" class="row row-cols-2 row-cols-md-4 g-3">
            <div class="col" th:each="goods : ${recommendGoods}">
                <div class="card h-100 product-card">
                    <a th:href="@{/goodsDetail(id=${goods.id})}">
                        <img th:src="@{/images/{pic}(pic=${goods.picture})}" class="card-img-top" alt="商品图片" style="background:#f0f0f0;object-fit:contain;padding:10px;">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title" th:text="${goods.name}"></h6>
                        <p class="card-text mb-2">
                            <span class="price-current">¥<span th:text="${goods.currentPrice}"></span></span>
                            <small class="price-original ms-2">¥<span th:text="${goods.originalPrice}"></span></small>
                        </p>
                        <div class="mt-auto d-flex gap-1 justify-content-center">
                            <button class="btn btn-sm btn-primary px-3"
                                    th:onclick="'addToCart('+${goods.id}+',1,this)'">
                                🛒 加入购物车
                            </button>
                            <button class="btn btn-sm btn-outline-danger px-3"
                                    th:onclick="'focusGoods('+${goods.id}+',this)'">
                                ♥ 收藏
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(recommendGoods)}" class="text-muted">暂时没有推荐商品。</p>
    </section>

    <!-- 最新商品 -->
    <section class="mb-5">
        <h3 class="mb-4 section-title">✨ 最新上架</h3>
        <div th:if="${not #lists.isEmpty(lastedGoods)}" class="row row-cols-2 row-cols-md-4 g-3">
            <div class="col" th:each="goods : ${lastedGoods}">
                <div class="card h-100 product-card">
                    <a th:href="@{/goodsDetail(id=${goods.id})}">
                        <img th:src="@{/images/{pic}(pic=${goods.picture})}" class="card-img-top" alt="商品图片" style="background:#f0f0f0;object-fit:contain;padding:10px;">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title" th:text="${goods.name}"></h6>
                        <p class="card-text mb-2">
                            <span class="price-current">¥<span th:text="${goods.currentPrice}"></span></span>
                            <small class="price-original ms-2">¥<span th:text="${goods.originalPrice}"></span></small>
                        </p>
                        <div class="mt-auto d-flex gap-1 justify-content-center">
                            <button class="btn btn-sm btn-primary px-3"
                                    th:onclick="'addToCart('+${goods.id}+',1,this)'">
                                🛒 加入购物车
                            </button>
                            <button class="btn btn-sm btn-outline-danger px-3"
                                    th:onclick="'focusGoods('+${goods.id}+',this)'">
                                ♥ 收藏
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(lastedGoods)}" class="text-muted">暂无新上架商品。</p>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
