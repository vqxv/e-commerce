<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 公共头部（导航栏、全局搜索、轮播图、购物车侧边栏等） -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5 pt-4">

    <!-- 分类下拉菜单 -->
    <div class="mb-4" th:if="${not #lists.isEmpty(goodsTypeList)}">
        <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button"
                    data-bs-toggle="dropdown" aria-expanded="false">
                商品分类
            </button>
            <ul class="dropdown-menu">
                <li th:each="type : ${goodsTypeList}">
                    <a class="dropdown-item" th:href="@{/(typeId=${type.id})}" th:text="${type.typename}"></a>
                </li>
            </ul>
        </div>
    </div>

    <!-- 推荐商品 -->
    <section class="mb-5">
        <h3 class="mb-3">🔥 推荐商品</h3>
        <div th:if="${not #lists.isEmpty(recommendGoods)}" class="row row-cols-2 row-cols-md-4 g-3">
            <div class="col" th:each="goods : ${recommendGoods}">
                <div class="card h-100 shadow-sm">
                    <a th:href="@{/goodsDetail(id=${goods.id})}">
                        <img th:src="'images/'+${goods.picture}" class="card-img-top" alt="商品图片">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title" th:text="${goods.name}"></h6>
                        <p class="card-text">
                            <span class="price-current">¥<span th:text="${goods.currentPrice}"></span></span>
                            <small class="price-original ms-2">¥<span th:text="${goods.originalPrice}"></span></small>
                        </p>
                        <div class="mt-auto d-flex gap-2">
                            <button class="btn btn-sm btn-primary"
                                    th:onclick="'addToCart('+${goods.id}+',1,this)'">
                                🛒 购物车
                            </button>
                            <button class="btn btn-sm btn-outline-danger"
                                    th:onclick="'focusGoods('+${goods.id}+',this)'">
                                ❤️ 收藏
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(recommendGoods)}" class="text-muted">暂时没有推荐商品。</p>
    </section>

    <!-- 最新商品 -->
    <section class="mb-5">
        <h3 class="mb-3">✨ 最新上架</h3>
        <div th:if="${not #lists.isEmpty(lastedGoods)}" class="row row-cols-2 row-cols-md-4 g-3">
            <div class="col" th:each="goods : ${lastedGoods}">
                <div class="card h-100 shadow-sm">
                    <a th:href="@{/goodsDetail(id=${goods.id})}">
                        <img th:src="'images/'+${goods.picture}" class="card-img-top" alt="商品图片">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title" th:text="${goods.name}"></h6>
                        <p class="card-text">
                            <span class="price-current">¥<span th:text="${goods.currentPrice}"></span></span>
                            <small class="price-original ms-2">¥<span th:text="${goods.originalPrice}"></span></small>
                        </p>
                        <div class="mt-auto d-flex gap-2">
                            <button class="btn btn-sm btn-primary"
                                    th:onclick="'addToCart('+${goods.id}+',1,this)'">
                                🛒 购物车
                            </button>
                            <button class="btn btn-sm btn-outline-danger"
                                    th:onclick="'focusGoods('+${goods.id}+',this)'">
                                ❤️ 收藏
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(lastedGoods)}" class="text-muted">暂无新上架商品。</p>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
