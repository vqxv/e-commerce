<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <base th:href="@{/}">
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
    <script src="js/jquery.min.js"></script>
    <script type="text/javascript" th:inline="javascript">
    function checkEmail(){
        var bemail = $("#bemail").val();
        $.ajax({
            url: [[@{user/isUse}]],
            type: "post",
            data: {bemail: bemail},
            success: function(obj){
                if(obj == "no"){
                    $("#emailMsg").text("该邮箱已注册").css("color","red");
                } else {
                    $("#emailMsg").text("邮箱可用").css("color","green");
                }
            }
        });
    }
    </script>
</head>
<body>
    <div class="container" style="max-width:400px;margin-top:50px;">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title text-center">用户注册</h3>
            </div>
            <div class="panel-body">
                <form th:action="@{user/register}" method="post">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="text" id="bemail" name="bemail" class="form-control" onblur="checkEmail()" placeholder="请输入邮箱"/>
                        <span id="emailMsg"></span>
                        <span style="color:red;" th:errors="${bUser.bemail}"></span>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="bpwd" class="form-control" placeholder="请输入密码"/>
                        <span style="color:red;" th:errors="${bUser.bpwd}"></span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">注册</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
