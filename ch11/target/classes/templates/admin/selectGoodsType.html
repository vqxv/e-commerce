<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <base th:href="@{/}">
    <meta charset="UTF-8">
    <title>类型管理</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
    <script src="js/jquery.min.js"></script>
    <script type="text/javascript" th:inline="javascript">
    function deleteType(tid){
        $.ajax({
            url: [[@{type/deleteType}]],
            type: "post",
            data: {id: tid},
            success: function(obj){
                if(obj == "no"){
                    alert("该类型有关联商品，不允许删除！");
                } else {
                    if(window.confirm("真的删除该类型吗？")){
                        var pathName = window.document.location.pathname;
                        var projectName = pathName.substring(0,pathName.substr(1).indexOf('/')+1);
                        window.location.href = projectName + obj;
                    }
                }
            },
            error: function(){
                alert("处理异常！");
            }
        });
    }
    </script>
</head>
<body>
    <div th:replace="admin/header :: header"></div>
    <br><br><br>
    <div class="container">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title">商品类型列表</h3>
            </div>
            <div class="panel-body">
                <div class="table table-responsive">
                    <table class="table table-bordered table-hover">
                        <tbody class="text-center">
                            <tr>
                                <th>类型ID</th>
                                <th>类型名称</th>
                                <th>操作</th>
                            </tr>
                            <tr th:each="type:${allTypes}">
                                <td th:text="${type.id}"></td>
                                <td th:text="${type.typename}"></td>
                                <td>
                                    <a th:href="'javascript:deleteType('+${type.id}+')'">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="3" align="right">
                                    <ul class="pagination">
                                        <li><a>第</a> <span th:text="${currentPage}"></span></li>
                                        <li><a>共</a> <span th:text="${totalPage}"></span></li>
                                        <a th:href="@{type/selectAllTypeByPage(currentPage=${currentPage-1})}">上一页</a>
                                        <span th:if="${currentPage} != ${totalPage}">
                                            <a th:href="@{type/selectAllTypeByPage(currentPage=${currentPage+1})}">下一页</a>
                                        </span>
                                    </ul>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
