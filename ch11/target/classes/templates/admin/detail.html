<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <base th:href="@{/}">
    <meta charset="UTF-8">
    <title>商品详情</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
</head>
<body>
    <div class="container">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title">商品详情</h3>
            </div>
            <div class="panel-body">
                <table class="table table-bordered">
                    <tr><td>商品ID</td><td th:text="${goods.id}"></td></tr>
                    <tr><td>商品名称</td><td th:text="${goods.gname}"></td></tr>
                    <tr><td>原价</td><td th:text="${goods.goprice}"></td></tr>
                    <tr><td>现价</td><td th:text="${goods.grprice}"></td></tr>
                    <tr><td>库存</td><td th:text="${goods.gstore}"></td></tr>
                    <tr><td>图片</td><td><img th:src="'images/'+${goods.gpicture}" style="width:100px;height:100px;"/></td></tr>
                    <tr><td>类型</td><td th:text="${goods.typename}"></td></tr>
                </table>
                <a href="javascript:history.back()">返回</a>
            </div>
        </div>
    </div>
</body>
</html>
