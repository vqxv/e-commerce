<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <base th:href="@{/}">
    <meta charset="UTF-8">
    <title>管理员登录</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
</head>
<body>
    <div class="container" style="max-width:400px;margin-top:100px;">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title text-center">管理员登录</h3>
            </div>
            <div class="panel-body">
                <form th:action="@{admin/login}" method="post">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" name="aname" class="form-control" placeholder="请输入用户名"/>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="apwd" class="form-control" placeholder="请输入密码"/>
                    </div>
                    <div style="color:red;" th:text="${errorMessage}"></div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
