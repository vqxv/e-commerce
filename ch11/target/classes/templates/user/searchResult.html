<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <base th:href="@{/}">
    <meta charset="UTF-8">
    <title>搜索结果</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
</head>
<body>
    <div th:replace="user/header :: header"></div>
    <div class="container">
        <h4>搜索结果</h4>
        <div class="row">
            <div class="col-xs-6 col-md-2" th:each="gds:${searchgoods}">
                <a th:href="'goodsDetail?id='+${gds.id}" class="thumbnail">
                    <img alt="100x180" th:src="'images/'+${gds.gpicture}" style="height:180px;width:100%;display:block;">
                </a>
                <div class="caption" style="text-align:center;">
                    <span th:text="${gds.gname}"></span>
                </div>
                <div>
                    <span style="color:red;">&yen; <span th:text="${gds.grprice}"></span></span>
                    <span class="text-dark" style="text-decoration:line-through;">&yen; <span th:text="${gds.goprice}"></span></span>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(searchgoods)}">
            <p>没有找到相关商品。</p>
        </div>
    </div>
</body>
</html>
