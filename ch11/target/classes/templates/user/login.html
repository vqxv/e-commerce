<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <base th:href="@{/}">
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
</head>
<body>
    <div class="container" style="max-width:400px;margin-top:50px;">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title text-center">用户登录</h3>
            </div>
            <div class="panel-body">
                <form th:action="@{user/login}" method="post">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="text" name="bemail" class="form-control" placeholder="请输入邮箱"/>
                        <span style="color:red;" th:errors="${bUser.bemail}"></span>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="bpwd" class="form-control" placeholder="请输入密码"/>
                        <span style="color:red;" th:errors="${bUser.bpwd}"></span>
                    </div>
                    <div class="form-group">
                        <label>验证码</label>
                        <input type="text" name="code" class="form-control" placeholder="请输入验证码" style="width:150px;display:inline;"/>
                        <img th:src="@{validateCode}" id="mycode" style="cursor:pointer;" onclick="this.src='validateCode?'+new Date().getTime();"/>
                    </div>
                    <div style="color:red;" th:text="${errorMessage}"></div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                    <a th:href="@{user/toRegister}">没有账号？去注册</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
